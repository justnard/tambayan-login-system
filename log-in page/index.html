<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Tambayan</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="login-box">

        <h1 class="logo">Tambayan</h1>

        <p class="tagline">
            Dito pwedeng tumambay, makipag-usap, at kumonekta sa iba.
        </p>

        <h2>Sign In</h2>

        <form>
            <input type="text" placeholder="Email or Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="login-btn">Log In</button>
        </form>

        <a href="#" class="forgot">Forgot Password?</a>
        <a href="sign-up page/signup.html" class="create-account">Create New Account</a>

    </div>

</div>

</body>
</html>
